<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<title>AZ Energy — Catalogue PDF par Métier</title>
<style>
:root{--gold:#D4A847;--dark:#0a0a0a;--dark2:#111;--dark3:#1a1a1a;--txt:#e8e8e8;--txt2:#aaa;--txt3:#666;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hdr{display:none!important}
.hdr-logo{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--gold)}
.hdr-logo span{color:var(--txt2);font-weight:300}
.hero{padding:48px 32px 36px;text-align:center}
.hero h1{font-size:28px;font-weight:800;margin-bottom:8px}.hero h1 span{color:var(--gold)}
.metiers-section{max-width:1100px;margin:0 auto;padding:32px}
.metiers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.mc{background:var(--dark3);border:1px solid #252525;border-radius:var(--radius);padding:24px 20px;cursor:pointer;transition:all .2s}
.mc:hover{border-color:var(--c,var(--gold));transform:translateY(-2px)}
.mc-icon{font-size:32px;margin-bottom:10px}
.mc-label{font-size:15px;font-weight:700;margin-bottom:4px}
.mc-count{font-size:12px;color:var(--txt3)}
.mc-bar{height:3px;border-radius:2px;margin-top:16px;background:var(--c,var(--gold));opacity:.6}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--dark3);border:1px solid #2a2a2a;border-radius:16px;padding:32px;max-width:480px;width:90%}
.modal h3{font-size:20px;font-weight:700;margin-bottom:16px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer}
.btn-ghost{background:transparent;border:1px solid #333;color:var(--txt2)}
.btn-primary{background:var(--gold);color:#000}
.pv-bar{background:var(--dark2);border-bottom:1px solid #222;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.pv-title{font-size:16px;font-weight:700}
.btn-print{background:var(--gold);color:#000;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
#app{display:block}#print-view{display:none}
/* ── Print page layout ── */
.pp{background:#fff;color:#000;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.4);padding:14mm 14mm 10mm;font-family:'Segoe UI',Arial,sans-serif;max-width:210mm;margin:24px auto;width:95%}
.pp-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;padding-bottom:10px;border-bottom:2.5px solid #D4A847}
.pp-title{font-size:17px;font-weight:800;color:#111}
.pp-page{font-size:10px;color:#888}
.pp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pc{border:1px solid #e0e0e0;border-radius:6px;padding:10px;font-size:11px;break-inside:avoid}
.pc-ref{font-weight:700;font-size:12px;color:#111;margin-bottom:3px}
.pc-badges{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.pb{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.pb-new{background:#22c55e;color:#fff}
.pb-top{background:#3b82f6;color:#fff}
.pb-promo{background:#ef4444;color:#fff}
.pc-desc{color:#444;margin-bottom:5px;font-size:10.5px;line-height:1.35}
.pc-mk{font-size:10px;color:#888;margin-bottom:4px}
.pc-specs{border-top:1px solid #eee;padding-top:4px;margin-top:4px}
.ps{display:flex;justify-content:space-between;font-size:9.5px;color:#666;margin-bottom:1px}
.ps strong{color:#333}
.pp-footer{margin-top:12px;padding-top:8px;border-top:1px solid #e0e0e0;font-size:9px;color:#aaa;text-align:center}
@media print{#print-view .pv-bar{display:none!important}.pp{box-shadow:none;border-radius:0;page-break-after:always;margin:0;width:100%;max-width:100%}}

let currentMetier=null;
function initCards(){
  const grid=document.getElementById('metiers-grid');
  grid.innerHTML=Object.values(METIERS).map(m=>{
    const total=ALL.filter(m.filter).length;
    return`<div class="mc" style="--c:${m.color}" onclick="openModal('${m.key}')">
      <div class="mc-icon">${m.icon}</div>
      <div class="mc-label">${m.label}</div>
      <div class="mc-count">${total} produits</div>
      <div style="font-size:11px;color:#555;margin-top:6px">${m.desc}</div>
      <div class="mc-bar"></div></div>`;
  }).join('');
}
function openModal(key){
  currentMetier=key;const m=METIERS[key];
  const total=ALL.filter(m.filter).length;
  document.getElementById('modal-title').textContent=m.icon+' '+m.label;
  document.getElementById('modal-info').textContent=total+' produits — '+m.desc;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function startGenerate(){
  closeModal();
  const m=METIERS[currentMetier];
  if(!m)return;
  const prods=ALL.filter(m.filter);
  const perPage=15;
  let pages='';
  for(let i=0;i<prods.length;i+=perPage){
    const chunk=prods.slice(i,i+perPage);
    const pageNum=Math.floor(i/perPage)+1;
    const totalPages=Math.ceil(prods.length/perPage);
    pages+=`<div class="pp">
      <div class="pp-hdr">
        <div class="pp-title">${m.icon} ${m.label} — AZ Energy</div>
        <div class="pp-page">Page ${pageNum} / ${totalPages} · ${prods.length} produits</div>
      </div>
      <div class="pp-grid">
        ${chunk.map(p=>{
          const specs=p.s||{};
          const specLines=Object.entries(specs).slice(0,3).map(([k,v])=>`<div class="ps"><span>${k}</span><strong>${v}</strong></div>`).join('');
          const badges=[];
          if(p.n)badges.push('<span class="pb pb-new">Nouveau</span>');
          if(p.p)badges.push('<span class="pb pb-top">Top vente</span>');
          if(p.promo)badges.push('<span class="pb pb-promo">Promo</span>');
          return `<div class="pc">
            <div class="pc-ref">${p.r||''}</div>
            ${badges.length?`<div class="pc-badges">${badges.join('')}</div>`:''}
            <div class="pc-desc">${p.d||''}</div>
            <div class="pc-mk">${p.m||''}${p.t?' · '+p.t:''}</div>
            <div class="pc-specs">${specLines}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="pp-footer">AZ Energy — Catalogue ${m.label} — ${new Date().toLocaleDateString('fr-FR')}</div>
    </div>`;
  }
  const pv=document.getElementById('print-view');
  pv.innerHTML=`<div class="pv-bar"><div class="pv-title">${m.icon} ${m.label}</div>
    <div style="display:flex;gap:8px">
      <button class="btn-print" onclick="window.print()">🖨️ Imprimer / PDF</button>
      <button class="btn btn-ghost" onclick="document.getElementById('app').style.display='';document.getElementById('print-view').style.display='none'">← Retour</button>
    </div></div>${pages}`;
  document.getElementById('app').style.display='none';
  pv.style.display='block';
}
document.addEventListener('DOMContentLoaded',initCards);
